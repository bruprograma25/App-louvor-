version: "3.9"
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app/backend
      - ./uploads:/app/uploads
    environment:
      - FLASK_ENV=development
      - DATABASE_URI=sqlite:///louvor.db
      - JWT_SECRET_KEY=change-this-secret

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
